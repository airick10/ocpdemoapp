# ──────────────────────────────────────────
# SECRET — MySQL credentials
# ──────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: rootpassword
  MYSQL_DATABASE: demodb
  MYSQL_USER: demo
  MYSQL_PASSWORD: demo
---
# ──────────────────────────────────────────
# DEPLOYMENT — MySQL pod
# ──────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          envFrom:
            - secretRef:
                name: mysql-secret
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost"]
            initialDelaySeconds: 10
            periodSeconds: 5
---
# ──────────────────────────────────────────
# SERVICE — MySQL (internal DNS: mysql:3306)
# ──────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: mysql
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
---
# ──────────────────────────────────────────
# DEPLOYMENT — Web app pod
# ──────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-web
  template:
    metadata:
      labels:
        app: demo-web
    spec:
      containers:
        - name: demo-web
          image: your-registry/openshift-demo:latest   # <-- update this
          ports:
            - containerPort: 8080
          env:
            - name: MYSQL_HOST
              value: mysql
            - name: MYSQL_PORT
              value: "3306"
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_DATABASE
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
# ──────────────────────────────────────────
# SERVICE — Web app
# ──────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: demo-web
spec:
  selector:
    app: demo-web
  ports:
    - port: 8080
      targetPort: 8080
---
# ──────────────────────────────────────────
# ROUTE — Exposes the web app externally
# (OpenShift-specific resource)
# ──────────────────────────────────────────
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: demo-web
spec:
  to:
    kind: Service
    name: demo-web
  port:
    targetPort: 8080
  tls:
    termination: edge
